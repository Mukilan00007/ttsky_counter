project:
  title:      "8-bit Up/Down Counter"
  description: "A simple synchronous 8-bit counter that can count up or down."
  how_it_works: "The counter increments or decrements based on the value of ui_in[0] on each clock edge."
  how_to_test:  "Toggle ui_in[0] to change direction and monitor uo_out for the binary count."
  author:      "Your Name"
  discord:     "" 
  language:    "Verilog"
  clock_hz:    10000000       # 10 MHz (typical for testing)

# Mapping the pins
inputs:
  - up_down    # ui_in[0]
  - none       # ui_in[1]
  - none       # ui_in[2]
  - none       # ui_in[3]
  - none       # ui_in[4]
  - none       # ui_in[5]
  - none       # ui_in[6]
  - none       # ui_in[7]
outputs:
  - count_0    # uo_out[0]
  - count_1    # uo_out[1]
  - count_2    # uo_out[2]
  - count_3    # uo_out[3]
  - count_4    # uo_out[4]
  - count_5    # uo_out[5]
  - count_6    # uo_out[6]
  - count_7    # uo_out[7]
bidirectional:
  - none
  - none
  - none
  - none
  - none
  - none
  - none
  - none

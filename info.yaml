# Tiny Tapeout project information
project:
  title:        "full_adder"      # Project title
  author:       "Mukilan"         # Your name
  discord:      ""                # Your discord username (optional)
  description:  "A simple 1-bit full adder with carry-in and carry-out"
  how_it_works: "Takes three 1-bit inputs (a, b, cin) and produces a sum and carry-out." # REQUIRED
  how_to_test:  "Apply binary inputs to ui_in[0:2] and observe outputs on uo_out[0:1]."   # REQUIRED
  language:     "Verilog" 
  clock_hz:     0        

  # How many tiles your design occupies? A 1x1 tile is standard for small projects.
  tiles: "1x1"          

  # Your top module name must match your verilog module name:
  top_module:  "tt_um_example"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. 
pinout:
  # Inputs (ui_in)
  ui_in:
    - "a"      # 0
    - "b"      # 1
    - "cin"    # 2
    - "none"   # 3
    - "none"   # 4
    - "none"   # 5
    - "none"   # 6
    - "none"   # 7

  # Outputs (uo_out)
  uo_out:
    - "sum"    # 0
    - "cout"   # 1
    - "none"   # 2
    - "none"   # 3
    - "none"   # 4
    - "none"   # 5
    - "none"   # 6
    - "none"   # 7

  # Bidirectional pins (uio_in/out/oe)
  uio:
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"

# Do not change!
yaml_version: 6
